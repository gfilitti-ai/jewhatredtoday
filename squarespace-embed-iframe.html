<!--
  IFRAME version. Paste into a Squarespace CODE BLOCK on the page shown at
  jewhatredtoday.com. Replace GHUSER and REPO with your GitHub username and repo name.
  Note: this points at index_sections.html (the FULL page), not embed_sections.html.
  The iframe auto-grows to fit the news so there is no inner scrollbar.
-->
<iframe id="jht-frame"
        src="https://GHUSER.github.io/REPO/index_sections.html"
        title="Jew-hatred Today"
        scrolling="no"
        style="width:100%;border:0;display:block;"
        height="1500"></iframe>
<script>
window.addEventListener("message", function (e) {
  if (e.data && e.data.jht && e.data.h) {
    document.getElementById("jht-frame").style.height = e.data.h + "px";
  }
});
</script>
