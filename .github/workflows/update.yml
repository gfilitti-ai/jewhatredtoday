name: Update Jew-hatred Today

on:
  push:
    branches: [main]          # rebuild whenever you push new code
  schedule:
    # Hourly PROBE at an off-peak minute (:43). Top-of-hour crons ("0 * * *") sit in
    # GitHub's most congested queue and get silently skipped under load. A probe only
    # triggers a real (Claude-calling) rebuild when the live page is stale -- see the
    # freshness guard in the "check" job -- so content still refreshes about every 4h at
    # flat API cost, while a skipped 4-hour slot is caught within ~1 hour, not 4-8.
    - cron: "43 * * * *"
  workflow_dispatch: {}       # allow manual runs from the Actions tab

# Least-privilege token; Pages deploy needs pages + id-token.
permissions:
  contents: read
  pages: write
  id-token: write

# Serialize Pages work; do NOT cancel an in-progress build (a new probe must never
# kill a real rebuild that is mid-flight).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Decide whether a rebuild is actually needed. On push / manual runs, always rebuild.
  # On the hourly schedule, rebuild only when the live page is older than the threshold.
  check:
    runs-on: ubuntu-latest
    outputs:
      stale: ${{ steps.guard.outputs.stale }}
    steps:
      - id: guard
        env:
          MAX_AGE_SECONDS: "13800"   # 3h50m: a ~4h-old page rebuilds; a fresher one is skipped
          LIVE_URL: "https://gfilitti-ai.github.io/jewhatredtoday/index.html"
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Event '${{ github.event_name }}': forcing a rebuild."
            echo "stale=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          html="$(curl -s --max-time 20 "$LIVE_URL")"
          epoch="$(printf '%s' "$html" | grep -oE 'build_epoch=[0-9]+' | head -1 | cut -d= -f2)"
          if [ -z "$epoch" ]; then
            echo "No build_epoch on the live page; rebuilding to be safe."
            echo "stale=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          now="$(date +%s)"
          age=$(( now - epoch ))
          echo "Live page age: ${age}s (threshold ${MAX_AGE_SECONDS}s)."
          if [ "$age" -ge "$MAX_AGE_SECONDS" ]; then
            echo "Stale -> rebuild."
            echo "stale=true" >> "$GITHUB_OUTPUT"
          else
            echo "Fresh -> skip (no Claude call, no deploy)."
            echo "stale=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.stale == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Generate page
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate.py
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: [check, build]
    if: needs.check.outputs.stale == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
